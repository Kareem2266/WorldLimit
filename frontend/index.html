<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorldLimit</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --fg: #e6e8eb;
        --muted: #8a8f98;
        --accent: #4aa3ff;
        --border: #1f242b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; }
      header .subtitle { color: var(--muted); font-size: 13px; }

      .controls {
        display: flex;
        gap: 8px;
        flex: 1;
        min-width: 320px;
      }
      input[type="text"] {
        flex: 1;
        padding: 8px 10px;
        background: #11151a;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        padding: 8px 16px;
        background: var(--accent);
        color: #001428;
        border: none;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      #status { color: var(--muted); font-size: 12px; min-height: 16px; }
      #status.error { color: #ff6b6b; }

      main {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #params {
        position: absolute;
        top: 12px;
        right: 12px;
        max-width: 280px;
        margin: 0;
        padding: 10px 12px;
        background: rgba(17, 21, 26, 0.85);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 11px;
        backdrop-filter: blur(4px);
        display: none;
      }
      #params.visible { display: block; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <h1>WorldLimit</h1>
      <span class="subtitle">prompt → 3D terrain</span>
      <form class="controls" id="form">
        <input
          type="text"
          id="prompt"
          placeholder="e.g. himalayan peaks, rolling savanna, flooded jungle"
          value="himalayan peaks"
          autocomplete="off"
        />
        <button type="submit" id="submit">Generate</button>
      </form>
      <div id="status"></div>
    </header>

    <main>
      <canvas id="canvas"></canvas>
      <pre id="params"></pre>
    </main>

    <script type="module" src="/app/main.js"></script>
  </body>
</html>
